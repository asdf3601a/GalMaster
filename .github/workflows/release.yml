# Build multi-platform GalMaster binaries and publish a GitHub Release.
#
# Triggers:
#   - push to main/master  → prerelease tag "continuous" (always updated)
#   - push tag v*          → versioned release (e.g. v0.1.0)
#   - pull_request         → build only (no release)
#   - workflow_dispatch    → same as push to default branch
#
name: Release

"on":
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            dist: linux-x86_64
            asset: galmaster-linux-x86_64
            archive: tar.gz
          - os: windows-latest
            target: windows
            dist: windows-x86_64
            asset: galmaster-windows-x86_64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev \
            libpipewire-0.3-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgbm-dev \
            libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libx11-dev libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.asset }}
          key: ${{ matrix.asset }}

      - name: Resolve version string
        id: ver
        run: |
          set -euo pipefail
          CARGO_V="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          CARGO_V="${CARGO_V:-0.0.0}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            # Hyphen (not +) so asset names are URL-friendly
            VERSION="${CARGO_V}-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "cargo_version=${CARGO_V}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Build & package
        run: |
          set -euo pipefail
          chmod +x scripts/build.sh
          ./scripts/build.sh "${{ matrix.target }}"
          test -d "dist/${{ matrix.dist }}"
          ls -lah "dist/${{ matrix.dist }}"

      - name: Create archive
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          DIST="${{ matrix.dist }}"
          ASSET="${{ matrix.asset }}"
          NAME="galmaster-${VERSION}-${ASSET#galmaster-}"
          # NAME e.g. galmaster-0.1.0-linux-x86_64
          mkdir -p release
          case "${{ matrix.archive }}" in
            tar.gz)
              tar -C dist -czf "release/${NAME}.tar.gz" "${DIST}"
              (cd release && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
              tar -tzf "release/${NAME}.tar.gz" | head -20
              ;;
            zip)
              # Real ZIP only — never `tar -a … .zip` (GNU tar writes a tar named .zip).
              ARCHIVE="release/${NAME}.zip"
              if command -v zip >/dev/null 2>&1; then
                (cd dist && zip -r "../${ARCHIVE}" "${DIST}")
              elif command -v powershell.exe >/dev/null 2>&1; then
                # Folder path keeps windows-x86_64/ as the archive root entry.
                powershell.exe -NoProfile -Command \
                  "Compress-Archive -Path 'dist\\${DIST}' -DestinationPath '${ARCHIVE}' -Force"
              elif command -v pwsh >/dev/null 2>&1; then
                pwsh -NoProfile -Command \
                  "Compress-Archive -Path 'dist/${DIST}' -DestinationPath '${ARCHIVE}' -Force"
              else
                echo "no zip tool available (need zip or PowerShell Compress-Archive)" >&2
                exit 1
              fi
              # Fail the job if the file is not a valid ZIP
              if command -v python3 >/dev/null 2>&1; then
                python3 -c "
          import sys, zipfile
          p = sys.argv[1]
          with zipfile.ZipFile(p) as z:
              bad = z.testzip()
              names = z.namelist()
              print('zip members:', names[:20])
              if bad:
                  raise SystemExit(f'corrupt zip member: {bad}')
              if not any('galmaster' in n for n in names):
                  raise SystemExit('zip missing galmaster binary')
          " "${ARCHIVE}"
              elif command -v unzip >/dev/null 2>&1; then
                unzip -t "${ARCHIVE}"
              else
                echo "warning: no zip validator (python3/unzip); skipping integrity check" >&2
              fi
              if command -v sha256sum >/dev/null 2>&1; then
                (cd release && sha256sum "${NAME}.zip" > "${NAME}.zip.sha256")
              elif command -v shasum >/dev/null 2>&1; then
                (cd release && shasum -a 256 "${NAME}.zip" | tee "${NAME}.zip.sha256")
              fi
              ;;
            *)
              echo "unknown archive type" >&2
              exit 1
              ;;
          esac
          ls -lah release/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master'
      ))
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout (for notes / version)
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort | xargs -r ls -lah

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          CARGO_V="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          CARGO_V="${CARGO_V:-0.0.0}"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            NAME="GalMaster ${TAG}"
            PRERELEASE=false
            MAKE_LATEST=true
            BODY_KIND=tag
          else
            # Continuous build for main/master / manual runs
            TAG="continuous"
            NAME="GalMaster continuous (${SHORT_SHA})"
            PRERELEASE=true
            MAKE_LATEST=false
            BODY_KIND=continuous
          fi

          {
            echo "tag=${TAG}"
            echo "name=${NAME}"
            echo "prerelease=${PRERELEASE}"
            echo "make_latest=${MAKE_LATEST}"
            echo "body_kind=${BODY_KIND}"
            echo "cargo_version=${CARGO_V}"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes body
        run: |
          set -euo pipefail
          {
            if [[ "${{ steps.meta.outputs.body_kind }}" == "tag" ]]; then
              echo "### GalMaster ${{ steps.meta.outputs.tag }}"
              echo
              echo "Cross-platform release builds (see assets below)."
            else
              echo "### Continuous build"
              echo
              echo "Auto-published from \`${GITHUB_REF_NAME}\` @ \`${{ steps.meta.outputs.short_sha }}\`."
              echo "Cargo workspace version: \`${{ steps.meta.outputs.cargo_version }}\`."
              echo
              echo "This prerelease is **replaced on every push** to main/master."
              echo "Prefer a \`v*\` tag for stable releases."
            fi
            echo
            echo "### Assets"
            echo
            echo "| Platform | Archive |"
            echo "|----------|---------|"
            echo "| Linux x86_64 | \`*-linux-x86_64.tar.gz\` |"
            echo "| Windows x86_64 (MSVC) | \`*-windows-x86_64.zip\` |"
            echo
            echo "Each archive contains a platform folder with the binary, \`config.example.toml\`, \`README.txt\`, and a \`.sha256\` checksum."
            echo
            echo "### Quick start"
            echo
            echo '```bash'
            echo "# Linux"
            echo "tar -xzf galmaster-*-linux-x86_64.tar.gz"
            echo "cd linux-x86_64"
            echo "./galmaster init-config"
            echo "./galmaster"
            echo '```'
            echo
            echo '```powershell'
            echo "# Windows"
            echo "Expand-Archive galmaster-*-windows-x86_64.zip -DestinationPath ."
            echo "cd windows-x86_64"
            echo ".\galmaster.exe init-config"
            echo ".\galmaster.exe"
            echo '```'
            echo
            echo "Windows Defender may scan unsigned EXEs; prefer the MSVC build and see \`docs/windows.md\`."
          } > release-body.md

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body_path: release-body.md
          # Point continuous (and new tags if needed) at this commit
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: artifacts/*
          fail_on_unmatched_files: true
          # Refresh assets when re-running continuous or re-tagging
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
